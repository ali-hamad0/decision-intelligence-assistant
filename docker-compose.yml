services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist Chroma data between container restarts
      - ./backend/chroma_data:/app/chroma_data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Point the built bundle at the backend
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

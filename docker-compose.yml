networks:
  app_network:
    driver: bridge

volumes:
  chroma_data:
  logs:

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LOG_DIR=/app/logs
    volumes:
      - chroma_data:/app/chroma_data
      - logs:/app/logs
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_ vars are baked into the JS bundle at build time.
        # localhost:8000 is correct here — the browser (on the host machine)
        # reaches the backend through the exposed port, not via the Docker network.
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app_network
